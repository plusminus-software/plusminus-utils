name: Release
run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('Release {0} @{1}', github.ref_name, github.sha)
      || '' }}

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  release:
    uses: plusminus-software/plusminus-workflows/.github/workflows/maven-central-release.yml@main
    with:
      java-version: '8'
    secrets: inherit